<!DOCTYPE html>
<html lang="en">
<head> 
    <link rel="stylesheet" href="../cssfolder/signup.css">
<link rel="stylesheet" href="../cssfolder/buttons.css">
   
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <div id="login-container">

        <h1>Sign Up</h1>
        <form action="signupreq">

            <div id="input-container">

        <input type="text" class="login-input" id="username" placeholder="Username"><br>
        <input type="email" class="login-input" id="email" placeholder="Email"><br>
        <input type="password" class="login-input" id="password" placeholder="Password"><br>
        <input type="password" class="login-input" id="confirm-password" placeholder="Confirm Password"><br>
        
        <div id="terms-row">
       <input type="checkbox" id="terms" name="terms">
          <label for="terms" id="terms-text">I agree to the terms and conditions</label>
        </div>
        </div>

    <button id="regester" type="button" onclick="window.location.href='index.html'">
            Sign Up
        </button>

    </form>
    </div>

</body>
</html>
